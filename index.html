<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM 管理儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{--bg:#07111f;--panel:#0f1c2f;--line:#1f3b60;--text:#e9f2ff;--muted:#88a4c9;--gold:#ffb938;--teal:#14d5c1;--cyan:#46a6ff;--purple:#9b7bff;--green:#1ee28b;--red:#ff6687;--orange:#ff914d}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#08111d,#091423);color:var(--text);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif}
    .wrap{width:min(1480px,calc(100vw - 24px));margin:0 auto;padding:16px 0 28px}
    .card{background:rgba(15,28,47,.96);border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 40px rgba(0,0,0,.24)}
    .top,.topline{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.top{padding:18px 20px;margin-bottom:14px}
    .brand,.actions,.tabs,.chips,.raw-tabs{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.brand{gap:12px}.mark{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:#173250;color:var(--gold);font-size:22px}
    h1,h2,h3,p{margin:0}h1{font-size:22px}.meta,.sub,.hint,.muted{color:var(--muted);font-size:12px}
    .tabs button,.ghost,.chip,.raw-tabs button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:9px 14px;font-weight:700;cursor:pointer}
    .tabs button.active,.chip.active,.raw-tabs button.active{background:linear-gradient(135deg,var(--gold),#ff9340);color:#07111f;border-color:transparent}
    .filters{padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1.5fr repeat(5,1fr) 1fr 1fr;gap:12px;align-items:end}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;color:var(--muted);font-weight:700}
    input,select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #2e5485;background:#10213a;color:var(--text);outline:none}input:focus,select:focus{border-color:var(--teal)}
    .quick{margin-top:12px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.result{text-align:right}.result b{display:block;font-size:38px;color:var(--gold);line-height:1}
    .kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;margin-bottom:14px}.kpi{padding:16px;border-radius:18px;border:1px solid var(--line);border-top:3px solid var(--accent);background:rgba(15,28,47,.96)}.kpi .icon{font-size:20px;margin-bottom:8px}.kpi .value{font-size:24px;font-weight:900;color:var(--accent)}.kpi .title,.kpi .desc{font-size:12px;color:var(--muted)}
    .section{display:none}.section.active{display:block}.overview{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}.kpi-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.panel{padding:16px}.panel h3{margin-bottom:12px;font-size:16px}
    .span-6{grid-column:span 6}
    .bars,.tiers,.alerts{display:grid;gap:12px}.bar{display:grid;gap:6px}.bar-h{display:flex;justify-content:space-between;font-size:13px}.track{height:8px;background:#243f64;border-radius:999px;overflow:hidden}.fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--teal),var(--cyan))}
    .table-wrap{overflow:auto;border:1px solid #28476d;border-radius:16px}table{width:100%;border-collapse:collapse;min-width:920px}th,td{padding:12px 14px;text-align:left;border-bottom:1px solid #223956;white-space:nowrap}th{position:sticky;top:0;background:#10233c;color:var(--gold);font-size:12px}td{font-size:14px}tr:nth-child(even) td{background:rgba(255,255,255,.02)}
    .empty{padding:28px 14px;text-align:center;color:var(--muted)}.overlay{position:fixed;inset:0;background:rgba(4,10,18,.92);display:grid;place-items:center;z-index:1000}.overlay-box{width:min(420px,calc(100vw - 24px));padding:24px;border-radius:22px;background:rgba(15,28,47,.98);border:1px solid var(--line)}.progress{height:8px;background:#223956;border-radius:999px;overflow:hidden;margin:14px 0}.progress div{height:100%;width:18%;background:linear-gradient(90deg,var(--gold),var(--teal));transition:width .25s}.logs{display:grid;gap:8px;font-size:13px}.log.ok{color:#dffcf0}.log.err{color:#ffd4df}
    .matrix{display:grid;gap:8px}.matrix-row{display:grid;grid-template-columns:120px repeat(3,1fr);gap:8px;align-items:center}.matrix-cell,.matrix-head{padding:10px 12px;border-radius:12px;border:1px solid #28476d;background:#10213a}.matrix-head{color:var(--gold);font-size:12px;font-weight:700}.matrix-label{color:var(--muted);font-size:13px}.matrix-cell strong{display:block;color:var(--text)}.matrix-cell span{font-size:12px;color:var(--muted)}
    .alert-item{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid #28476d;border-radius:14px;background:#10213a}.alert-title{font-weight:700}.alert-sub{font-size:12px;color:var(--muted)}.risk-high{color:var(--red)}.risk-mid{color:var(--orange)}.risk-low{color:var(--teal)}
    @media (max-width:1200px){.grid,.kpis,.overview,.kpi-grid{grid-template-columns:repeat(2,1fr)}.span-6{grid-column:span 1}.matrix-row{grid-template-columns:1fr}}
    @media (max-width:760px){.wrap{width:min(100vw - 16px,100%)}.grid,.kpis,.overview,.kpi-grid{grid-template-columns:1fr}.result{text-align:left}}
  </style>
  <script>
    (function(){const token=localStorage.getItem('crm_token');if(!token){window.location.href='/login.html';return;}const rawFetch=window.fetch;window.fetch=function(url,opt){opt=opt||{};opt.headers=Object.assign({},opt.headers,{Authorization:'Bearer '+token});return rawFetch(url,opt).then(function(response){if(response.status===401){localStorage.removeItem('crm_token');localStorage.removeItem('crm_user');window.location.href='/login.html';}return response;});};})();
  </script>
</head>
<body>
  <div class="overlay" id="overlay"><div class="overlay-box"><h2>CRM 管理儀表板</h2><p class="muted">正在讀取資料、建立圖表與 KPI 分析</p><div class="progress"><div id="progress"></div></div><div class="logs" id="logs"></div></div></div>
  <div class="wrap">
    <div class="card top">
      <div class="brand"><div class="mark">▦</div><div><h1>CRM 管理儀表板</h1><div class="meta" id="conn-status">載入中</div></div></div>
      <div class="actions">
        <div class="tabs">
          <button class="active" data-tab="overview">總覽</button>
          <button data-tab="kpi">KPI指標</button>
          <button data-tab="raw">原始資料</button>
        </div>
        <button class="ghost" id="sync-btn">重新載入</button>
        <button class="ghost" id="export-btn">匯出目前客戶</button>
        <button class="ghost" id="admin-btn" onclick="window.location.href='/admin.html'" style="display:none">帳號管理</button>
        <button class="ghost" onclick="crmLogout()">登出</button>
      </div>
    </div>
    <div class="card filters">
      <div class="grid">
        <div class="field"><label>搜尋</label><input id="search" placeholder="公司、業務員、ID、聯絡人"></div>
        <div class="field"><label>業務員</label><select id="rep"></select></div>
        <div class="field"><label>地區</label><select id="region"></select></div>
        <div class="field"><label>產業</label><select id="industry"></select></div>
        <div class="field"><label>等級</label><select id="tier"></select></div>
        <div class="field"><label>狀態</label><select id="status"></select></div>
        <div class="field"><label>起始日期</label><input id="start" type="date"></div>
        <div class="field"><label>結束日期</label><input id="end" type="date"></div>
      </div>
      <div class="quick">
        <div><div class="muted">快速區間</div><div class="chips"><button class="chip active" data-range="all">全部</button><button class="chip" data-range="q1">Q1</button><button class="chip" data-range="q2">Q2</button><button class="chip" data-range="q3">Q3</button><button class="chip" data-range="q4">Q4</button><button class="chip" data-range="2025">2025</button></div></div>
        <div class="result"><b id="count">0</b><span class="sub">篩選結果 / 總客戶 <span id="total">0</span></span></div>
      </div>
    </div>
    <div class="kpis" id="kpis"></div>
    <div class="section active" id="section-overview"><div class="overview">
      <div class="card panel"><h3>業務員業績分析 <span class="hint">客戶數與成交數</span></h3><canvas id="rep-chart" height="150"></canvas></div>
      <div class="card panel"><h3>產業分布</h3><canvas id="industry-chart" height="180"></canvas></div>
      <div class="card panel"><h3>銷售狀態漏斗</h3><div class="bars" id="status-bars"></div></div>
      <div class="card panel"><h3>月份趨勢 <span class="hint">依建立/預估成交日期</span></h3><canvas id="month-chart" height="150"></canvas></div>
      <div class="card panel"><h3>地區金額分布</h3><div class="bars" id="region-bars"></div></div>
      <div class="card panel"><h3>客戶等級分布</h3><div class="tiers" id="tier-bars"></div></div>
    </div></div>
    <div class="section" id="section-kpi"><div class="kpi-grid">
      <div class="card panel span-6"><h3>KPI 1：業務員成交率排行</h3><canvas id="rep-win-chart" height="180"></canvas></div>
      <div class="card panel span-6"><h3>KPI 2：月度營收趨勢</h3><canvas id="monthly-revenue-chart" height="180"></canvas></div>
      <div class="card panel span-6"><h3>KPI 3：客戶等級 × 地區交叉分析</h3><div class="matrix" id="tier-region-matrix"></div></div>
      <div class="card panel span-6"><h3>KPI 4：流失預警（30 天未跟進）</h3><div class="alerts" id="churn-alerts"></div></div>
      <div class="card panel span-6"><h3>KPI 5：銷售漏斗轉換率</h3><div class="bars" id="sales-funnel"></div></div>
    </div></div>
    <div class="section" id="section-raw"><div class="raw-tabs" id="raw-tabs"></div><div class="card panel"><div class="topline"><h3 id="raw-title">原始資料</h3><button class="ghost" id="export-raw-btn">匯出目前原始表</button></div><div class="table-wrap"><table><thead id="raw-head"></thead><tbody id="raw-body"></tbody></table></div></div></div>
  </div>
  <script>
    const RAW={customers:[],sales:[],orders:[],followup:[],reps:[]};
    const KPI={repWinRate:[],monthlyRevenue:[],tierRegionMatrix:[],churnAlerts:[],salesFunnel:[]};
    const LABELS={customers:'客戶資料',sales:'銷售機會',orders:'訂單資料',followup:'跟進紀錄',reps:'業務員名單'};
    const RAW_COLORS={customers:'var(--gold)',sales:'var(--green)',orders:'var(--cyan)',followup:'var(--purple)',reps:'var(--teal)'};
    const STATE={range:'all',rawKey:'customers'};
    const palette=['#ffb938','#14d5c1','#46a6ff','#9b7bff','#ff914d','#ff73c8','#1ee28b','#7aa6ff'];
    let customers=[],sales=[],filtered=[],repChart,industryChart,monthChart,repWinChart,monthlyRevenueChart;
    const $=id=>document.getElementById(id);
    const text=value=>String(value??'').trim();
    const numberValue=value=>{if(typeof value==='number')return value;const n=Number(String(value??'').replace(/,/g,'').trim());return Number.isFinite(n)?n:0;};
    const dateValue=value=>{const v=text(value).replace(/\//g,'-');if(!v)return null;const d=new Date(v);return Number.isNaN(d.getTime())?null:d;};
    const formatWan=value=>`${(value/10000).toFixed(value>=1000000?0:1)}萬`;
    function addLog(message,type=''){const node=document.createElement('div');node.className=`log ${type}`;node.textContent=`${type==='ok'?'✓':type==='err'?'✕':'•'} ${message}`;$('logs').appendChild(node);return node;}
    function setProgress(value){$('progress').style.width=`${value}%`;}
    function exportRows(rows,filename){if(!rows.length)return;const cols=Object.keys(rows[0]);const csv=[cols.join(','),...rows.map(row=>cols.map(col=>`\"${String(row[col]??'').replace(/\"/g,'\"\"')}\"`).join(','))];const link=document.createElement('a');link.href=URL.createObjectURL(new Blob([`\uFEFF${csv.join('\n')}`],{type:'text/csv;charset=utf-8'}));link.download=filename;link.click();URL.revokeObjectURL(link.href);}
    function normalizeSales(rows){return rows.map(row=>({id:text(row.sale_id),customerId:text(row.customer_id),company:text(row.company),status:text(row.status),currency:text(row.currency)||'TWD',amount:numberValue(row.amount),expectedDate:text(row.expected_date),actualDate:text(row.actual_date),rep:text(row.rep),note:text(row.note),createdAt:text(row.created_at),updatedAt:text(row.updated_at)})).filter(row=>row.id);}
    function normalizeCustomers(rows,salesRows){const salesByCustomer=new Map();salesRows.forEach(row=>{if(!row.customerId)return;if(!salesByCustomer.has(row.customerId))salesByCustomer.set(row.customerId,[]);salesByCustomer.get(row.customerId).push(row);});return rows.map(row=>{const id=text(row.customer_no);if(!id)return null;const related=salesByCustomer.get(id)||[];return{id,company:text(row.company),contact:text(row.contact),jobTitle:text(row.title),phone:text(row.phone),email:text(row.email),industry:text(row.industry),region:text(row.region),tier:text(row.tier),rep:text(row.rep),status:text(row.status),orderCount:numberValue(row.order_count),satisfaction:numberValue(row.satisfaction),createdAt:text(row.created_at),updatedAt:text(row.updated_at),note:text(row.note),revenue:numberValue(row.revenue)||related.reduce((sum,sale)=>sum+sale.amount,0)};}).filter(Boolean);}
    function currentDateRange(){return{start:$('start').value?new Date(`${$('start').value}T00:00:00`):null,end:$('end').value?new Date(`${$('end').value}T23:59:59`):null};}
    function syncQuickRangeInputs(){const year='2025';if(STATE.range==='all')return;if(STATE.range==='2025'){$('start').value=`${year}-01-01`;$('end').value=`${year}-12-31`;return;}const map={q1:['01-01','03-31'],q2:['04-01','06-30'],q3:['07-01','09-30'],q4:['10-01','12-31']};const pair=map[STATE.range];if(pair){$('start').value=`${year}-${pair[0]}`;$('end').value=`${year}-${pair[1]}`;}}
    function fillSelect(id,values){const element=$(id);const previous=element.value;element.innerHTML='<option value=\"\">全部</option>';values.forEach(value=>{const option=document.createElement('option');option.value=value;option.textContent=value;element.appendChild(option);});element.value=values.includes(previous)?previous:'';}
    function buildFilters(){fillSelect('rep',[...new Set(customers.map(item=>item.rep).filter(Boolean))].sort());fillSelect('region',[...new Set(customers.map(item=>item.region).filter(Boolean))].sort());fillSelect('industry',[...new Set(customers.map(item=>item.industry).filter(Boolean))].sort());fillSelect('tier',[...new Set(customers.map(item=>item.tier).filter(Boolean))].sort());fillSelect('status',[...new Set(customers.map(item=>item.status).filter(Boolean))].sort());}
    function activeSales(){const ids=new Set(filtered.map(item=>item.id));return sales.filter(item=>ids.has(item.customerId));}
    function applyFilters(){const search=text($('search').value).toLowerCase();const rep=$('rep').value,region=$('region').value,industry=$('industry').value,tier=$('tier').value,status=$('status').value;const {start,end}=currentDateRange();filtered=customers.filter(item=>{const date=dateValue(item.createdAt)||dateValue(item.updatedAt);if(rep&&item.rep!==rep)return false;if(region&&item.region!==region)return false;if(industry&&item.industry!==industry)return false;if(tier&&item.tier!==tier)return false;if(status&&item.status!==status)return false;if(date){if(start&&date<start)return false;if(end&&date>end)return false;}else if(start||end){return false;}if(!search)return true;return[item.id,item.company,item.rep,item.contact].join(' ').toLowerCase().includes(search);});$('count').textContent=filtered.length;$('total').textContent=customers.length;renderAll();}
    function renderKpis(){const filteredSalesRows=activeSales();const won=filteredSalesRows.filter(item=>item.status==='成交');const lost=filteredSalesRows.filter(item=>item.status==='流失');const totalAmount=filteredSalesRows.reduce((sum,item)=>sum+item.amount,0);const wonAmount=won.reduce((sum,item)=>sum+item.amount,0);const aCount=filtered.filter(item=>item.tier==='A').length;const average=filtered.length?filtered.reduce((sum,item)=>sum+item.satisfaction,0)/filtered.length:0;const conversion=filteredSalesRows.length?(won.length/filteredSalesRows.length)*100:0;const items=[['客',filtered.length,'家','總客戶數','var(--cyan)',`${Math.round((filtered.length/Math.max(customers.length,1))*100)}%`],['錢',formatWan(totalAmount),'','總銷售金額','var(--teal)',`${filteredSalesRows.length} 筆`],['成',won.length,'件','成交數','var(--green)',formatWan(wonAmount)],['流',lost.length,'件','流失數','var(--red)',`${filteredSalesRows.length?Math.round((lost.length/filteredSalesRows.length)*100):0}%`],['轉',conversion.toFixed(1),'%','轉換率','var(--cyan)','成交 / 銷售'],['星',aCount,'家','A 級客戶','var(--purple)',`${filtered.length?Math.round((aCount/filtered.length)*100):0}%`],['評',average.toFixed(1),'/5','平均滿意度','var(--orange)','依客戶主表'],['額',formatWan(wonAmount),'','成交金額','var(--gold)','依成交案件估算']];$('kpis').innerHTML=items.map(([icon,value,unit,title,color,desc])=>`<div class=\"kpi\" style=\"--accent:${color}\"><div class=\"icon\">${icon}</div><div class=\"value\">${value}<span class=\"sub\">${unit}</span></div><div class=\"title\">${title}</div><div class=\"desc\">${desc}</div></div>`).join('');}
    function renderBars(id,rows,formatter,colorPicker,emptyMessage='沒有可顯示的資料'){const element=$(id);if(!rows.length){element.innerHTML=`<div class=\"empty\">${emptyMessage}</div>`;return;}const max=Math.max(...rows.map(row=>row.value),1);element.innerHTML=rows.map((row,index)=>`<div class=\"bar\"><div class=\"bar-h\"><span>${row.label}</span><span style=\"color:${colorPicker(index,row)}\">${formatter(row.value,row)}</span></div><div class=\"track\"><div class=\"fill\" style=\"width:${Math.round((row.value/max)*100)}%;background:${colorPicker(index,row)}\"></div></div></div>`).join('');}
    function chartOptions(){return{responsive:true,plugins:{legend:{labels:{color:'#bdd0ec',font:{size:11}}}},scales:{x:{ticks:{color:'#86a2c8'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#86a2c8'},grid:{color:'rgba(255,255,255,.04)'}}}};}
    function renderOverviewCharts(){const filteredSalesRows=activeSales();const reps=[...new Set([...filtered.map(item=>item.rep).filter(Boolean),...RAW.reps.map(item=>text(item.name)).filter(Boolean)])];const repStats=reps.map(name=>({name,customers:filtered.filter(item=>item.rep===name).length,won:filteredSalesRows.filter(item=>item.rep===name&&item.status==='成交').length})).filter(item=>item.customers||item.won);if(repChart)repChart.destroy();repChart=new Chart($('rep-chart'),{type:'bar',data:{labels:repStats.map(item=>item.name),datasets:[{label:'客戶',data:repStats.map(item=>item.customers),backgroundColor:'#9b7bff',borderRadius:6},{label:'成交',data:repStats.map(item=>item.won),backgroundColor:'#1ee28b',borderRadius:6}]},options:chartOptions()});const industries={};filtered.forEach(item=>{const key=item.industry||'未分類';industries[key]=(industries[key]||0)+1;});const industryLabels=Object.keys(industries);if(industryChart)industryChart.destroy();industryChart=new Chart($('industry-chart'),{type:'doughnut',data:{labels:industryLabels,datasets:[{data:industryLabels.map(key=>industries[key]),backgroundColor:industryLabels.map((_,index)=>palette[index%palette.length]),borderColor:'#0c1627',borderWidth:1}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#bdd0ec',boxWidth:12,font:{size:11}}}}}});const statusMap={};filteredSalesRows.forEach(item=>{const key=item.status||'未設定';statusMap[key]=(statusMap[key]||0)+1;});renderBars('status-bars',Object.entries(statusMap).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value),value=>`${value}`,(_,row)=>row.label==='成交'?'var(--green)':row.label==='流失'?'var(--red)':'var(--gold)');const monthMap={};filteredSalesRows.forEach(item=>{const date=dateValue(item.actualDate)||dateValue(item.expectedDate)||dateValue(item.createdAt);if(!date)return;const key=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;if(!monthMap[key])monthMap[key]={count:0,amount:0};monthMap[key].count+=1;monthMap[key].amount+=item.amount;});const monthLabels=Object.keys(monthMap).sort().slice(-12);if(monthChart)monthChart.destroy();monthChart=new Chart($('month-chart'),{type:'line',data:{labels:monthLabels,datasets:[{label:'案件數',data:monthLabels.map(key=>monthMap[key].count),borderColor:'#14d5c1',backgroundColor:'rgba(20,213,193,.1)',fill:true,tension:.35,pointRadius:4,yAxisID:'y'},{label:'金額',data:monthLabels.map(key=>monthMap[key].amount),borderColor:'#ffb938',borderDash:[4,4],fill:false,tension:.35,pointRadius:4,yAxisID:'y1'}]},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#bdd0ec',font:{size:11}}}},scales:{x:{ticks:{color:'#86a2c8'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#86a2c8'},grid:{color:'rgba(255,255,255,.04)'}},y1:{position:'right',ticks:{color:'#86a2c8',callback:value=>`${Math.round(value/10000)}萬`},grid:{drawOnChartArea:false}}}}});const customerMap=new Map(customers.map(item=>[item.id,item]));const regionMap={};filteredSalesRows.forEach(item=>{const key=customerMap.get(item.customerId)?.region||'未分類';regionMap[key]=(regionMap[key]||0)+item.amount;});renderBars('region-bars',Object.entries(regionMap).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value),value=>`NT$ ${formatWan(value)}`,index=>palette[index%palette.length]);const tiers=['A','B','C'].map(tier=>{const count=filtered.filter(item=>item.tier===tier).length;return{tier,count,percent:filtered.length?Math.round((count/filtered.length)*100):0};});$('tier-bars').innerHTML=tiers.map(row=>`<div class=\"bar\"><div class=\"bar-h\"><span>${row.tier} 級</span><span>${row.count} <span class=\"muted\">(${row.percent}%)</span></span></div><div class=\"track\"><div class=\"fill\" style=\"width:${row.percent}%;background:${row.tier==='A'?'var(--gold)':row.tier==='B'?'var(--cyan)':'#7f96bb'}\"></div></div></div>`).join('');}
    function renderRepWinRateChart(){const rows=KPI.repWinRate.slice(0,8);if(repWinChart)repWinChart.destroy();repWinChart=new Chart($('rep-win-chart'),{type:'bar',data:{labels:rows.map(row=>row.rep),datasets:[{label:'成交率',data:rows.map(row=>numberValue(row.win_rate)),backgroundColor:'#46a6ff',borderRadius:6},{label:'成交件數',data:rows.map(row=>numberValue(row.won_sales)),backgroundColor:'#1ee28b',borderRadius:6}]},options:chartOptions()});}
    function renderMonthlyRevenueChart(){const rows=KPI.monthlyRevenue;if(monthlyRevenueChart)monthlyRevenueChart.destroy();monthlyRevenueChart=new Chart($('monthly-revenue-chart'),{type:'line',data:{labels:rows.map(row=>row.month),datasets:[{label:'營收',data:rows.map(row=>numberValue(row.revenue)),borderColor:'#ffb938',backgroundColor:'rgba(255,185,56,.1)',fill:true,tension:.35,pointRadius:4,yAxisID:'y'},{label:'訂單數',data:rows.map(row=>numberValue(row.order_count)),borderColor:'#14d5c1',borderDash:[4,4],fill:false,tension:.35,pointRadius:4,yAxisID:'y1'}]},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#bdd0ec',font:{size:11}}}},scales:{x:{ticks:{color:'#86a2c8'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#86a2c8',callback:value=>`${Math.round(value/10000)}萬`},grid:{color:'rgba(255,255,255,.04)'}},y1:{position:'right',ticks:{color:'#86a2c8'},grid:{drawOnChartArea:false}}}}});}
    function renderTierRegionMatrix(){const rows=KPI.tierRegionMatrix;const regions=[...new Set(rows.map(row=>row.region))];const tiers=['A','B','C'];const matrix=new Map(rows.map(row=>[`${row.region}:${row.tier}`,row]));const head=`<div class=\"matrix-row\"><div class=\"matrix-head\">地區</div>${tiers.map(tier=>`<div class=\"matrix-head\">${tier} 級</div>`).join('')}</div>`;const body=regions.map(region=>`<div class=\"matrix-row\"><div class=\"matrix-label\">${region}</div>${tiers.map(tier=>{const row=matrix.get(`${region}:${tier}`);return`<div class=\"matrix-cell\"><strong>${row?row.customer_count:0} 家</strong><span>平均滿意度 ${row?Number(row.avg_satisfaction).toFixed(1):'-'}</span></div>`;}).join('')}</div>`).join('');$('tier-region-matrix').innerHTML=rows.length?head+body:'<div class=\"empty\">沒有交叉分析資料</div>';}
    function renderChurnAlerts(){const rows=KPI.churnAlerts.slice(0,8);$('churn-alerts').innerHTML=rows.length?rows.map(row=>{const riskClass=row.risk_level==='高'?'risk-high':row.risk_level==='中'?'risk-mid':'risk-low';const days=row.days_since_followup==null?'從未跟進':`${row.days_since_followup} 天`;return`<div class=\"alert-item\"><div><div class=\"alert-title\">${row.company}</div><div class=\"alert-sub\">${row.customer_id} · ${row.rep||'未指派'} · ${row.region||'未分類'} · ${row.tier||'-'}</div></div><div style=\"text-align:right\"><div class=\"${riskClass}\">${row.risk_level} 風險</div><div class=\"alert-sub\">${days}</div></div></div>`;}).join(''):'<div class=\"empty\">目前沒有超過 30 天未跟進的客戶</div>';}
    function renderSalesFunnel(){renderBars('sales-funnel',KPI.salesFunnel.map(row=>({label:row.stage,value:numberValue(row.count),conversionRate:numberValue(row.conversion_rate)})),(value,row)=>`${value} 件 / ${row.conversionRate}%`,(_,row)=>row.label==='成交'?'var(--green)':row.label==='流失'?'var(--red)':'var(--gold)');}
    function renderKPISection(){renderRepWinRateChart();renderMonthlyRevenueChart();renderTierRegionMatrix();renderChurnAlerts();renderSalesFunnel();}
    function renderRawTabs(){$('raw-tabs').innerHTML=Object.entries(LABELS).map(([key,label])=>`<button class=\"${STATE.rawKey===key?'active':''}\" data-raw=\"${key}\">${label} (${RAW[key].length})</button>`).join('');}
    function renderRawTable(){const key=STATE.rawKey;const rows=RAW[key]||[];const color=RAW_COLORS[key];$('raw-title').textContent=`${LABELS[key]} (${rows.length} 筆)`;if(!rows.length){$('raw-head').innerHTML='';$('raw-body').innerHTML='<tr><td class=\"empty\">沒有資料</td></tr>';return;}const columns=Object.keys(rows[0]);$('raw-head').innerHTML=`<tr>${columns.map(column=>`<th style=\"color:${color}\">${column||'未命名欄位'}</th>`).join('')}</tr>`;$('raw-body').innerHTML=rows.slice(0,200).map(row=>`<tr>${columns.map(column=>`<td>${row[column]??''}</td>`).join('')}</tr>`).join('');}
    function renderAll(){renderKpis();renderOverviewCharts();renderKPISection();renderRawTabs();renderRawTable();}
    async function loadData(options={}){const syncBeforeLoad=options.syncBeforeLoad!==false;$('logs').innerHTML='';const line=addLog(syncBeforeLoad?'同步 Google Sheets':'讀取原始資料');setProgress(18);try{if(syncBeforeLoad){const syncResponse=await fetch(`/api/sync-now?t=${Date.now()}`,{method:'POST',cache:'no-store'});if(!syncResponse.ok)throw new Error(`同步失敗 HTTP ${syncResponse.status}`);const syncResult=await syncResponse.json();line.className='log ok';line.textContent=syncResult.skipped?'✓ 使用最近一次同步結果':'✓ Google Sheets 同步完成';addLog('讀取最新資料庫內容');setProgress(42);}const [allResponse,kpiResponse]=await Promise.all([fetch(`/api/all?t=${Date.now()}`,{cache:'no-store'}),fetch(`/api/kpi/dashboard?t=${Date.now()}`,{cache:'no-store'})]);if(!allResponse.ok)throw new Error(`資料載入失敗 HTTP ${allResponse.status}`);if(!kpiResponse.ok)throw new Error(`KPI 載入失敗 HTTP ${kpiResponse.status}`);Object.assign(RAW,await allResponse.json());Object.assign(KPI,await kpiResponse.json());line.className='log ok';line.textContent=syncBeforeLoad?'✓ 已同步並載入最新資料':'✓ 已取得原始資料與 KPI 分析';addLog('重建首頁統計與圖表');setProgress(60);sales=normalizeSales(RAW.sales);customers=normalizeCustomers(RAW.customers,sales);buildFilters();applyFilters();$('conn-status').textContent=`已同步：客戶 ${RAW.customers.length} · 銷售 ${RAW.sales.length} · 訂單 ${RAW.orders.length} · 跟進 ${RAW.followup.length} · 業務員 ${RAW.reps.length}`;setProgress(100);setTimeout(()=>{$('overlay').style.display='none';},350);}catch(error){line.className='log err';line.textContent=`✕ 載入失敗：${error.message}`;addLog('請確認 server 正在執行且登入狀態有效。','err');setProgress(100);}}
    document.querySelectorAll('.tabs button').forEach(button=>button.addEventListener('click',()=>{document.querySelectorAll('.tabs button').forEach(node=>node.classList.remove('active'));button.classList.add('active');document.querySelectorAll('.section').forEach(section=>section.classList.remove('active'));$(`section-${button.dataset.tab}`).classList.add('active');}));
    ['search','rep','region','industry','tier','status','start','end'].forEach(id=>{$(id).addEventListener(id==='search'?'input':'change',()=>{STATE.range='all';document.querySelectorAll('.chip').forEach(chip=>chip.classList.toggle('active',chip.dataset.range==='all'));applyFilters();});});
    document.querySelector('.chips').addEventListener('click',event=>{const button=event.target.closest('[data-range]');if(!button)return;STATE.range=button.dataset.range;document.querySelectorAll('.chip').forEach(chip=>chip.classList.toggle('active',chip===button));if(STATE.range==='all'){$('start').value='';$('end').value='';}else{syncQuickRangeInputs();}applyFilters();});
    $('raw-tabs').addEventListener('click',event=>{const button=event.target.closest('[data-raw]');if(!button)return;STATE.rawKey=button.dataset.raw;renderRawTabs();renderRawTable();});
    $('sync-btn').addEventListener('click',()=>{$('overlay').style.display='grid';$('logs').innerHTML='';setProgress(10);loadData({syncBeforeLoad:true});});
    $('export-btn').addEventListener('click',()=>exportRows(filtered,'crm_customers_filtered.csv'));
    $('export-raw-btn').addEventListener('click',()=>exportRows(RAW[STATE.rawKey]||[],`crm_${STATE.rawKey}.csv`));
    (function(){const user=JSON.parse(localStorage.getItem('crm_user')||'{}');if(user.role==='admin')$('admin-btn').style.display='';})();
    function crmLogout(){fetch('/api/auth/logout',{method:'POST'}).finally(function(){localStorage.removeItem('crm_token');localStorage.removeItem('crm_user');window.location.href='/login.html';});}
    loadData({syncBeforeLoad:true});
  </script>
</body>
